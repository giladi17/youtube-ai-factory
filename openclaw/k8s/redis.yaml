---
# ── Redis — pipeline state bus ────────────────────────────────────────────
# Stores per-run pipeline state: { run_id, current_stage, s3_paths, status }
# Only the orchestrator reads/writes Redis; all agents communicate via S3.
# Single instance — acceptable for this use case (pipeline is sequential).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: default
  labels:
    app: redis
    app.kubernetes.io/part-of: yt-factory
    app.kubernetes.io/component: state-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        app.kubernetes.io/part-of: yt-factory
    spec:
      # Pin to the managed node group — Redis must always be available,
      # not subject to Karpenter scale-to-zero
      nodeSelector:
        node.kubernetes.io/pool: light-agents
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "192Mi"
              cpu: "200m"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: default
  labels:
    app: redis
    app.kubernetes.io/part-of: yt-factory
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
