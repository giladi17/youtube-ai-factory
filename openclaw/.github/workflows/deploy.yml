name: Build and Push — YouTube AI Factory

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push orchestrator (brain) image
      uses: docker/build-push-action@v5
      with:
        context: ./brain
        push: true
        tags: giladi17/yt-factory-brain:latest
        platforms: linux/amd64,linux/arm64

    - name: Build and push agent image (stages 1, 2, 4)
      uses: docker/build-push-action@v5
      with:
        context: ./agent
        file: ./agent/Dockerfile
        push: true
        tags: giladi17/yt-factory-agent:latest
        platforms: linux/amd64,linux/arm64

    - name: Build and push video-editor image (stage 3)
      uses: docker/build-push-action@v5
      with:
        context: ./agent
        file: ./agent/Dockerfile.video_editor
        push: true
        tags: giladi17/yt-factory-video-editor:latest
        platforms: linux/amd64
